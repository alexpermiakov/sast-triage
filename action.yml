# Composite action wrapping the sast-triage binary. Remote use downloads the
# prebuilt binary for the pinned release, verified by sha256 + build provenance;
# a local checkout (`uses: ./`, the dogfood workflow) compiles the working tree
# instead. Either way the ref you pin determines the code that runs. Inputs
# mirror the CLI flags one-to-one (flag `-base-url` → input `base-url`); logic
# stays in the Go binary, this file only maps inputs to flags.
name: SAST Triage
description: >-
  Triage SAST findings (SARIF 2.1.0) with a bounded LLM agent and an evidence-keyed verdict cache.
author: alexpermiakov
branding:
  icon: search
  color: purple

inputs:
  provider:
    description: "LLM API shape: anthropic for Claude's native API, openai for anything OpenAI-compatible. Leave empty (the default) and base-url selects it for you"
    default: ""
  model:
    description: "Model name — always required (e.g. claude-sonnet-5 for anthropic, qwen2.5-coder:7b for openai)"
    required: true
  base-url:
    description: "OpenAI-compatible API base URL; required when provider is openai (e.g. http://localhost:11434/v1). No default: the tool only ever talks to the endpoint you name"
    default: ""
  api-key:
    description: "API key for whichever provider is selected — routed to ANTHROPIC_API_KEY or OPENAI_API_KEY to match. Self-hosted endpoints need none. Prefer this over the provider-specific inputs below"
    default: ""
  anthropic-api-key:
    description: "Provider-specific alternative to api-key, for provider: anthropic. Wins over api-key when both are set"
    default: ""
  openai-api-key:
    description: "Provider-specific alternative to api-key, for hosted OpenAI-compatible endpoints. Wins over api-key when both are set"
    default: ""
  sarif:
    description: SARIF 2.1.0 input produced by your scanner
    default: findings.sarif
  repo:
    description: Repository root the findings refer to
    default: "."
  cache:
    description: Verdict cache file (commit it to git)
    default: triage-cache.json
  report:
    description: Markdown report output (complete; no size cap)
    default: triage-report.md
  digest:
    description: >-
      Byte-bounded digest of the report, safe to publish to the step summary
      (1 MiB cap) or a PR/issue body (65,536 chars). Empty = skip.
    default: triage-digest.md
  digest-bytes:
    description: Size cap for the digest; overflow is dropped by priority (benign first, exploitable last)
    default: "50000"
  triaged-sarif:
    description: Write a verdict-annotated SARIF copy here for Code Scanning upload; empty = skip
    default: ""
  effort:
    description: "Triage depth per finding: small | medium | large"
    default: medium
  max-findings-budget:
    description: Max findings triaged by LLM per run (0 = unlimited)
    default: "50"
  parallel:
    description: Findings triaged concurrently
    default: "4"
  fail-on-new-exploitable:
    description: Fail the step if this run decides any NEW exploitable finding (cache hits never trip it)
    default: "true"
  create-issues:
    description: File GitHub issues for exploitable findings (needs an issues-writable token)
    default: "false"
  github-repo:
    description: owner/name for issue creation; defaults to the current repository
    default: ""
  github-token:
    description: Token used for issue creation when create-issues is true
    default: ${{ github.token }}
  link-base:
    description: Base URL for clickable evidence links, e.g. https://github.com/owner/repo/blob/<sha>
    default: ""
  extra-args:
    description: 'Extra CLI flags appended verbatim, e.g. "-max-iterations 15 -issue-label security"'
    default: ""

runs:
  using: composite
  steps:
    # Local checkout (`uses: ./`, this repo's dogfood workflow): the action path
    # sits inside the workspace, so compile the working tree — a dogfood run must
    # exercise the code under review, never the last release.
    - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      if: startsWith(github.action_path, github.workspace)
      with:
        go-version: stable
        # go.sum lives in the action path, outside the workspace on remote use,
        # where setup-go's cache glob cannot see it.
        cache: false

    - name: Build sast-triage from the local checkout
      if: startsWith(github.action_path, github.workspace)
      shell: bash
      run: go build -C "$GITHUB_ACTION_PATH" -o "$RUNNER_TEMP/sast-triage" ./cmd/sast-triage

    # Remote use (`uses: alexpermiakov/sast-triage@<ref>`): download the prebuilt
    # binary instead of installing Go and compiling (~20s -> ~2s).
    #
    # SAST_TRIAGE_VERSION must be bumped in the same commit that gets tagged, so
    # the pinned ref and the binary it fetches are the same release. Two checks
    # stand in for compiling the source yourself: the sha256 from the release's
    # checksums.txt, and the build provenance attestation, which proves this repo's
    # release workflow produced the binary from this tag. Both are fatal on
    # mismatch — a security tool does not run an unverified binary.
    - name: Download the pinned sast-triage release binary
      if: ${{ !startsWith(github.action_path, github.workspace) }}
      shell: bash
      env:
        SAST_TRIAGE_VERSION: v1.2.0
        SAST_TRIAGE_REPO: alexpermiakov/sast-triage
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        case "$(uname -s)" in
          Linux) os=linux ;;
          Darwin) os=darwin ;;
          *) echo "::error::sast-triage publishes linux and macOS binaries only; $(uname -s) is unsupported"; exit 1 ;;
        esac
        case "$(uname -m)" in
          x86_64 | amd64) arch=amd64 ;;
          arm64 | aarch64) arch=arm64 ;;
          *) echo "::error::unsupported architecture $(uname -m)"; exit 1 ;;
        esac

        asset="sast-triage_${os}_${arch}"
        base="https://github.com/${SAST_TRIAGE_REPO}/releases/download/${SAST_TRIAGE_VERSION}"
        curl -fsSL --retry 3 -o "$RUNNER_TEMP/$asset" "$base/$asset"
        curl -fsSL --retry 3 -o "$RUNNER_TEMP/checksums.txt" "$base/checksums.txt"

        # macOS runners ship shasum, not sha256sum.
        cd "$RUNNER_TEMP"
        if command -v sha256sum >/dev/null; then sum="sha256sum"; else sum="shasum -a 256"; fi
        grep " ${asset}\$" checksums.txt | $sum -c -

        gh attestation verify "$RUNNER_TEMP/$asset" --repo "$SAST_TRIAGE_REPO"

        mv "$RUNNER_TEMP/$asset" "$RUNNER_TEMP/sast-triage"
        chmod +x "$RUNNER_TEMP/sast-triage"

    # Inputs reach the shell only via env (never interpolated into the script),
    # so a hostile model/base-url string cannot inject commands.
    - name: Triage
      shell: bash
      env:
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_BASE_URL: ${{ inputs.base-url }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        INPUT_OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        INPUT_SARIF: ${{ inputs.sarif }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_CACHE: ${{ inputs.cache }}
        INPUT_REPORT: ${{ inputs.report }}
        INPUT_DIGEST: ${{ inputs.digest }}
        INPUT_DIGEST_BYTES: ${{ inputs.digest-bytes }}
        INPUT_TRIAGED_SARIF: ${{ inputs.triaged-sarif }}
        INPUT_EFFORT: ${{ inputs.effort }}
        INPUT_MAX_FINDINGS_BUDGET: ${{ inputs.max-findings-budget }}
        INPUT_PARALLEL: ${{ inputs.parallel }}
        INPUT_FAIL_ON_NEW_EXPLOITABLE: ${{ inputs.fail-on-new-exploitable }}
        INPUT_CREATE_ISSUES: ${{ inputs.create-issues }}
        INPUT_GITHUB_REPO: ${{ inputs.github-repo }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_LINK_BASE: ${{ inputs.link-base }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        args=(
          -model "$INPUT_MODEL"
          -sarif "$INPUT_SARIF" -repo "$INPUT_REPO"
          -cache "$INPUT_CACHE" -report "$INPUT_REPORT"
          -effort "$INPUT_EFFORT"
          -max-findings-budget "$INPUT_MAX_FINDINGS_BUDGET"
          -parallel "$INPUT_PARALLEL"
          -fail-on-new-exploitable="$INPUT_FAIL_ON_NEW_EXPLOITABLE"
        )
        # Empty provider is passed as no flag at all, so the binary infers it
        # from base-url rather than being pinned to a default it never chose.
        if [ -n "$INPUT_PROVIDER" ]; then args+=(-provider "$INPUT_PROVIDER"); fi
        if [ -n "$INPUT_BASE_URL" ]; then args+=(-base-url "$INPUT_BASE_URL"); fi
        if [ -n "$INPUT_TRIAGED_SARIF" ]; then args+=(-triaged-sarif "$INPUT_TRIAGED_SARIF"); fi
        args+=(-digest "$INPUT_DIGEST")
        if [ -n "$INPUT_DIGEST_BYTES" ]; then args+=(-digest-bytes "$INPUT_DIGEST_BYTES"); fi
        if [ -n "$INPUT_LINK_BASE" ]; then args+=(-link-base "$INPUT_LINK_BASE"); fi
        if [ -n "$INPUT_GITHUB_REPO" ]; then args+=(-github-repo "$INPUT_GITHUB_REPO"); fi
        if [ "$INPUT_CREATE_ISSUES" = "true" ]; then args+=(-create-issues); fi
        if [ -n "$INPUT_EXTRA_ARGS" ]; then
          read -r -a extra <<< "$INPUT_EXTRA_ARGS"
          args+=("${extra[@]}")
        fi
        # Generic api-key routes to the selected provider's env var; a
        # provider-specific input, when set, wins over it.
        if [ -n "$INPUT_API_KEY" ]; then
          if [ "$INPUT_PROVIDER" = anthropic ]; then
            export ANTHROPIC_API_KEY="$INPUT_API_KEY"
          else
            export OPENAI_API_KEY="$INPUT_API_KEY"
          fi
        fi
        if [ -n "$INPUT_ANTHROPIC_API_KEY" ]; then export ANTHROPIC_API_KEY="$INPUT_ANTHROPIC_API_KEY"; fi
        if [ -n "$INPUT_OPENAI_API_KEY" ]; then export OPENAI_API_KEY="$INPUT_OPENAI_API_KEY"; fi
        export GITHUB_TOKEN="${GITHUB_TOKEN:-$INPUT_GITHUB_TOKEN}"
        "$RUNNER_TEMP/sast-triage" "${args[@]}"

