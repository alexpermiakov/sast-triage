name: SAST Triage
description: >-
  Triage SAST findings (SARIF 2.1.0) with a bounded LLM agent and an evidence-keyed verdict cache.
author: alexpermiakov
branding:
  icon: search
  color: purple

inputs:
  provider:
    description: "LLM API shape: anthropic for Claude's native API, openai for anything OpenAI-compatible. Leave empty (the default) and base-url selects it for you"
    default: ""
  model:
    description: "Model name — always required (e.g. claude-sonnet-5 for anthropic, qwen2.5-coder:7b for openai)"
    required: true
  base-url:
    description: "OpenAI-compatible API base URL; required when provider is openai (e.g. http://localhost:11434/v1). No default: the tool only ever talks to the endpoint you name"
    default: ""
  api-key:
    description: "API key for whichever provider is selected — routed to ANTHROPIC_API_KEY or OPENAI_API_KEY to match. Self-hosted endpoints need none. Prefer this over the provider-specific inputs below"
    default: ""
  anthropic-api-key:
    description: "Provider-specific alternative to api-key, for provider: anthropic. Wins over api-key when both are set"
    default: ""
  openai-api-key:
    description: "Provider-specific alternative to api-key, for hosted OpenAI-compatible endpoints. Wins over api-key when both are set"
    default: ""
  sarif-file:
    description: SARIF 2.1.0 input produced by your scanner
    default: findings.sarif
  repo:
    description: Repository root the findings refer to
    default: "."
  scope:
    description: >-
      What to triage: full (every finding in the SARIF) or diff (only findings in
      files changed since base-ref). Set it from your trigger — pull_request wants
      diff, schedule and workflow_dispatch want full. Never inferred.
    default: full
  base-ref:
    description: "Base to diff against when scope is diff, e.g. origin/main. Needs fetch-depth: 0 on checkout"
    default: ""
  mode:
    description: >-
      Whether this run can fail the build: enforce (exit 3 on exploitable findings
      in scope), report (advisory), or baseline (triage everything, gate nothing —
      seeding a fresh cache).
    default: enforce
  fail-on:
    description: >-
      Which verdict classes fail the build when mode is enforce: "exploitable"
      (the default), or "exploitable,uncertain" to fail on findings triage could
      not resolve either. Findings deferred by the run budget never gate — that
      is the tool running out of time, not a claim about your code.
    default: exploitable
  no-suppress-cwe:
    description: >-
      CWE classes the agent may not dismiss as benign, comma-separated (e.g.
      "CWE-502,CWE-611"). A benign verdict on these is recorded as uncertain and
      stays visible instead of suppressing the finding. Empty (the default) bars
      nothing. A value that is not a CWE id fails the run rather than being
      ignored, because a list that matches nothing looks exactly like a repo
      with nothing to find. Measured starting point, if you want one:
      "CWE-78,CWE-327,CWE-328,CWE-501,CWE-614".
    default: ""
  cache-write:
    description: >-
      What to do with the updated cache: branch (commit to the branch being built —
      use on PRs), pr (open/refresh one review PR — use when seeding), or none
      (artifact only). Fork PRs cannot push, and fall back to none automatically.
    default: none
  cache:
    description: Verdict cache file (commit it to git)
    default: .sast-triage/cache.json
  report:
    description: Markdown report output (complete; no size cap)
    default: triage-report.md
  digest:
    description: >-
      Byte-bounded digest of the report, safe to publish to the step summary
      (1 MiB cap) or a PR/issue body (65,536 chars). Empty = skip.
    default: triage-digest.md
  digest-bytes:
    description: Size cap for the digest; overflow is dropped by priority (benign first, exploitable last)
    default: "50000"
  summary:
    description: >-
      Run headline plus one bounded verdict table (15 rows max). Used verbatim as
      the seed PR body, which sits above a cache diff carrying every verdict in
      full. Empty = skip.
    default: triage-summary.md
  triaged-sarif:
    description: >-
      Verdict-annotated copy of the input SARIF — benign findings gain a SARIF
      suppression, nothing is ever deleted. Upload it to Code Scanning or feed it
      to DefectDojo. On by default; empty = skip.
    default: triaged.sarif
  effort:
    description: "Triage depth per finding: small | medium | large | xlarge"
    default: medium
  max-findings-budget:
    description: Max findings triaged by LLM per run (0 = unlimited)
    default: "50"
  parallel:
    description: Findings triaged concurrently
    default: "4"
  create-issues:
    description: File GitHub issues for exploitable findings (needs an issues-writable token)
    default: "false"
  pr-comments:
    description: >-
      Post exploitable verdicts as inline comments on the PR diff, and one
      conversation comment listing what this change proposes to suppress and
      linking the cache diff (needs pull-requests: write). Auto-detects the PR
      number on pull_request triggers.
    default: "false"
  github-repo:
    description: owner/name for issue creation; defaults to the current repository
    default: ""
  github-token:
    description: Token used for issue creation when create-issues is true
    default: ${{ github.token }}
  link-base:
    description: Base URL for clickable evidence links, e.g. https://github.com/owner/repo/blob/<sha>
    default: ""
  extra-args:
    description: 'Extra CLI flags appended verbatim, e.g. "-max-iterations 15 -issue-label security"'
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      if: startsWith(github.action_path, github.workspace)
      with:
        go-version: stable
        cache: false

    - name: Build sast-triage from the local checkout
      if: startsWith(github.action_path, github.workspace)
      shell: bash
      run: go build -C "$GITHUB_ACTION_PATH" -o "$RUNNER_TEMP/sast-triage" ./cmd/sast-triage

    - name: Download the pinned sast-triage release binary
      if: ${{ !startsWith(github.action_path, github.workspace) }}
      shell: bash
      env:
        SAST_TRIAGE_VERSION: v1.2.12
        SAST_TRIAGE_REPO: alexpermiakov/sast-triage
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        case "$(uname -s)" in
          Linux) os=linux ;;
          Darwin) os=darwin ;;
          *) echo "::error::sast-triage publishes linux and macOS binaries only; $(uname -s) is unsupported"; exit 1 ;;
        esac
        case "$(uname -m)" in
          x86_64 | amd64) arch=amd64 ;;
          arm64 | aarch64) arch=arm64 ;;
          *) echo "::error::unsupported architecture $(uname -m)"; exit 1 ;;
        esac

        asset="sast-triage_${os}_${arch}"
        base="https://github.com/${SAST_TRIAGE_REPO}/releases/download/${SAST_TRIAGE_VERSION}"
        curl -fsSL --retry 3 -o "$RUNNER_TEMP/$asset" "$base/$asset"
        curl -fsSL --retry 3 -o "$RUNNER_TEMP/checksums.txt" "$base/checksums.txt"

        # macOS runners ship shasum, not sha256sum.
        cd "$RUNNER_TEMP"
        if command -v sha256sum >/dev/null; then sum="sha256sum"; else sum="shasum -a 256"; fi
        grep " ${asset}\$" checksums.txt | $sum -c -

        gh attestation verify "$RUNNER_TEMP/$asset" --repo "$SAST_TRIAGE_REPO"

        mv "$RUNNER_TEMP/$asset" "$RUNNER_TEMP/sast-triage"
        chmod +x "$RUNNER_TEMP/sast-triage"

    - name: Triage
      id: triage
      shell: bash
      env:
        SAST_TRIAGE_DEBUG_HTTP: ${{ startsWith(github.action_path, github.workspace) && '1' || '' }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_BASE_URL: ${{ inputs.base-url }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        INPUT_OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        INPUT_SARIF_FILE: ${{ inputs.sarif-file }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_SCOPE: ${{ inputs.scope }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_CACHE: ${{ inputs.cache }}
        INPUT_REPORT: ${{ inputs.report }}
        INPUT_DIGEST: ${{ inputs.digest }}
        INPUT_DIGEST_BYTES: ${{ inputs.digest-bytes }}
        INPUT_SUMMARY: ${{ inputs.summary }}
        INPUT_TRIAGED_SARIF: ${{ inputs.triaged-sarif }}
        INPUT_EFFORT: ${{ inputs.effort }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_NO_SUPPRESS_CWE: ${{ inputs.no-suppress-cwe }}
        INPUT_MAX_FINDINGS_BUDGET: ${{ inputs.max-findings-budget }}
        INPUT_PARALLEL: ${{ inputs.parallel }}
        INPUT_CREATE_ISSUES: ${{ inputs.create-issues }}
        INPUT_PR_COMMENTS: ${{ inputs.pr-comments }}
        INPUT_PR_NUMBER: ${{ github.event.pull_request.number }}
        INPUT_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        INPUT_GITHUB_REPO: ${{ inputs.github-repo }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_LINK_BASE: ${{ inputs.link-base }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        args=(
          -model "$INPUT_MODEL"
          -sarif-file "$INPUT_SARIF_FILE" -repo "$INPUT_REPO"
          -cache "$INPUT_CACHE" -report "$INPUT_REPORT"
          -scope "$INPUT_SCOPE" -mode "$INPUT_MODE"
          -fail-on "$INPUT_FAIL_ON"
          -no-suppress-cwe "$INPUT_NO_SUPPRESS_CWE"
          -effort "$INPUT_EFFORT"
          -max-findings-budget "$INPUT_MAX_FINDINGS_BUDGET"
          -parallel "$INPUT_PARALLEL"
        )
        if [ -n "$INPUT_BASE_REF" ]; then args+=(-base-ref "$INPUT_BASE_REF"); fi
        # Inline comments need a PR to comment on; outside a pull_request
        # trigger there is none, so the flag is simply omitted rather than
        # failing a run that asked for a surface this event does not have.
        if [ "$INPUT_PR_COMMENTS" = "true" ] && [ -n "$INPUT_PR_NUMBER" ]; then
          args+=(-pr "$INPUT_PR_NUMBER" -commit "$INPUT_COMMIT_SHA")
        elif [ "$INPUT_PR_COMMENTS" = "true" ]; then
          echo "::notice::pr-comments is on but this is not a pull_request event — no PR to comment on."
        fi
        # Empty provider is passed as no flag at all, so the binary infers it
        # from base-url rather than being pinned to a default it never chose.
        if [ -n "$INPUT_PROVIDER" ]; then args+=(-provider "$INPUT_PROVIDER"); fi
        if [ -n "$INPUT_BASE_URL" ]; then args+=(-base-url "$INPUT_BASE_URL"); fi
        # Passed unconditionally, like -digest: all three default to a real path
        # in the binary, so an operator clearing the input must reach the binary
        # as an explicit empty value, not as an omitted flag that re-enables it.
        args+=(-triaged-sarif "$INPUT_TRIAGED_SARIF")
        args+=(-digest "$INPUT_DIGEST")
        args+=(-summary "$INPUT_SUMMARY")
        if [ -n "$INPUT_DIGEST_BYTES" ]; then args+=(-digest-bytes "$INPUT_DIGEST_BYTES"); fi
        if [ -n "$INPUT_LINK_BASE" ]; then args+=(-link-base "$INPUT_LINK_BASE"); fi
        # Not an input: there is exactly one correct value on a runner, and it
        # is one the workflow author should never have to look up.
        args+=(-run-url "$RUN_URL")
        if [ -n "$INPUT_GITHUB_REPO" ]; then args+=(-github-repo "$INPUT_GITHUB_REPO"); fi
        if [ "$INPUT_CREATE_ISSUES" = "true" ]; then args+=(-create-issues); fi
        if [ -n "$INPUT_EXTRA_ARGS" ]; then
          read -r -a extra <<< "$INPUT_EXTRA_ARGS"
          args+=("${extra[@]}")
        fi
        # Generic api-key routes to the selected provider's env var; a
        # provider-specific input, when set, wins over it.
        if [ -n "$INPUT_API_KEY" ]; then
          if [ "$INPUT_PROVIDER" = anthropic ]; then
            export ANTHROPIC_API_KEY="$INPUT_API_KEY"
          else
            export OPENAI_API_KEY="$INPUT_API_KEY"
          fi
        fi
        if [ -n "$INPUT_ANTHROPIC_API_KEY" ]; then export ANTHROPIC_API_KEY="$INPUT_ANTHROPIC_API_KEY"; fi
        if [ -n "$INPUT_OPENAI_API_KEY" ]; then export OPENAI_API_KEY="$INPUT_OPENAI_API_KEY"; fi
        export GITHUB_TOKEN="${GITHUB_TOKEN:-$INPUT_GITHUB_TOKEN}"

        # Exit 3 (gate tripped) is recorded and re-raised at the end of the
        # action, after the cache has been written out. Those verdicts were paid
        # for; dropping them because the gate fired means paying again next run,
        # and the cache delta showing a new exploitable is precisely what the
        # reviewer needs to see. Real failures (1, 2) still stop here.
        rc=0
        "$RUNNER_TEMP/sast-triage" "${args[@]}" || rc=$?
        echo "exit-code=$rc" >> "$GITHUB_OUTPUT"
        if [ "$rc" != 0 ] && [ "$rc" != 3 ]; then exit "$rc"; fi

    - name: Commit the cache delta
      if: ${{ always() && inputs.cache-write != 'none' }}
      shell: bash
      env:
        INPUT_CACHE: ${{ inputs.cache }}
        INPUT_CACHE_WRITE: ${{ inputs.cache-write }}
        INPUT_SUMMARY: ${{ inputs.summary }}
        HEAD_REF: ${{ github.head_ref }}
        IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        # A fork PR's token is read-only. That is not an error and must not look
        # like one: triage still ran, the gate still applies, and the cache
        # rides out in the artifact instead.
        if [ "$IS_FORK" = "true" ]; then
          echo "::notice::fork PR — the token is read-only, so the cache delta stays in the artifact only. Triage and the gate are unaffected."
          exit 0
        fi
        if [ ! -f "$INPUT_CACHE" ]; then
          echo "no cache file at $INPUT_CACHE; nothing to commit"; exit 0
        fi
        if [ -z "$(git status --porcelain -- "$INPUT_CACHE")" ]; then
          echo "cache unchanged; nothing to commit"; exit 0
        fi

        git config user.name "sast-triage-bot"
        git config user.email "sast-triage-bot@users.noreply.github.com"
        git add -- "$INPUT_CACHE"
        MSG="chore(triage): verdict cache update $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"

        if [ "$INPUT_CACHE_WRITE" = branch ]; then
          if [ -z "$HEAD_REF" ]; then
            echo "::warning::cache-write: branch outside a pull_request has no head branch to commit to; skipping."
            exit 0
          fi
          git commit -m "$MSG"
          git push origin "HEAD:refs/heads/$HEAD_REF"
          echo "committed the cache delta to $HEAD_REF"
          exit 0
        fi

        if [ "$INPUT_CACHE_WRITE" = pr ]; then
          BRANCH="sast-triage/seed"
          git checkout -B "$BRANCH"
          git commit -m "$MSG"
          git push -f origin "$BRANCH"
          # The body is the binary's -summary output verbatim: a headline and a
          # bounded verdict table. Composing it here instead would mean this
          # shell knowing the verdict counts, which means parsing markdown — the
          # failure -summary exists to remove. The fallback covers -summary being
          # cleared; the PR still opens, pointing at the diff below it.
          BODY=triage-body.md
          if [ -n "$INPUT_SUMMARY" ] && [ -f "$INPUT_SUMMARY" ]; then
            BODY="$INPUT_SUMMARY"
          else
            echo "Seeded verdict cache. Review the proposed suppressions in the \`$INPUT_CACHE\` diff below before merging." > "$BODY"
          fi
          if [ "$(gh pr list --head "$BRANCH" --state open --json number --jq length)" != "0" ]; then
            gh pr edit "$BRANCH" --body-file "$BODY"
          elif ! gh pr create --head "$BRANCH" --title "seed sast-triage cache" --body-file "$BODY"; then
            echo "::error::Enable Settings → Actions → General → 'Allow GitHub Actions to create and approve pull requests'."
            exit 1
          fi
          exit 0
        fi

        echo "::error::unknown cache-write value '$INPUT_CACHE_WRITE' (want branch, pr or none)"
        exit 1

    - name: Gate
      if: ${{ always() && steps.triage.outputs.exit-code == '3' }}
      shell: bash
      run: |
        echo "::error::sast-triage: exploitable findings in scope — see the triage report and the inline PR comments."
        exit 1

