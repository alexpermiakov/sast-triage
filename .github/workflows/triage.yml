name: Triage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: triage-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write

env:
  ANTHROPIC_MODEL: claude-sonnet-5
  # Local-model switch-back: uncomment the `ollama` service + "Pull triage model"
  # step below and run triage with:
  #   -provider openai -base-url http://localhost:11434/v1 -model qwen2.5-coder:1.5b-instruct

jobs:
  triage:
    runs-on: ubuntu-latest
    # services:
    #   ollama:
    #     image: ollama/ollama@sha256:50ab2378567a62b811a2967759dd91f254864c3495cbe50576bd8a85bc6edd56 # 0.6.8
    #     ports: ["11434:11434"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - name: Build sast-triage
        run: go build -o /usr/local/bin/sast-triage ./cmd/sast-triage

      - name: Install opengrep
        run: |
          curl -fsSL -o /usr/local/bin/opengrep \
            https://github.com/opengrep/opengrep/releases/download/v1.25.0/opengrep_manylinux_x86
          echo "9ac4aebb47ba3f7b0d8fc641ac8749cb6c2f253f616131a67d9631e00d4bea33  /usr/local/bin/opengrep" | sha256sum -c
          chmod +x /usr/local/bin/opengrep

      - name: Checkout scan rules (pinned)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: opengrep/opengrep-rules
          ref: f1d2b562b414783763fd02a6ed2736eaed622efa
          path: .opengrep-rules

      - name: Scan
        run: |
          opengrep scan -f .opengrep-rules/go -f .opengrep-rules/yaml \
            --sarif --dataflow-traces --exclude testdata --exclude .opengrep-rules \
            --output findings.sarif
          rm -rf .opengrep-rules

      # - name: Pull triage model   # re-enable with the `ollama` service above
      #   run: |
      #     for i in $(seq 1 30); do curl -fsS http://localhost:11434/api/version && break || sleep 2; done
      #     curl -fsS http://localhost:11434/api/pull -d '{"name":"qwen2.5-coder:1.5b-instruct"}'

      # PR gates on new exploitables; push files issues + writes the annotated SARIF.
      - name: Triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          LINK_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          [ -z "$ANTHROPIC_API_KEY" ] && { echo "::notice::no API key (fork PR?) — triage skipped."; exit 0; }
          
          if [ "${{ github.event_name }}" = pull_request ]; then
            MODE="-fail-on-new-exploitable"
          else
            MODE="-create-issues -github-repo $REPO -triaged-sarif triaged.sarif"
          fi
          sast-triage -provider anthropic -model "$ANTHROPIC_MODEL" \
            -sarif findings.sarif -repo . $MODE \
            -link-base "https://github.com/$REPO/blob/$LINK_SHA"

      - name: Upload triaged SARIF to Code Scanning
        id: codescan
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: triaged.sarif
          category: sast-triage

      - name: Dismiss benign alerts
        if: github.event_name != 'pull_request'
        uses: advanced-security/dismiss-alerts@a18f986bdb40edba0dd7a74382c15d4a3d50a1c8 # v2.0.3
        with:
          sarif-id: ${{ steps.codescan.outputs.sarif-id }}
          sarif-file: triaged.sarif
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish report to run summary
        if: always()
        run: '[ -f triage-report.md ] && cat triage-report.md >> "$GITHUB_STEP_SUMMARY" || true'

      - name: Refresh cache review PR
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- triage-cache.json)" ]; then
            echo "cache unchanged; no PR"; exit 0
          fi
          BRANCH="triage/main"
          git config user.name "sast-triage-bot"
          git config user.email "sast-triage-bot@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add triage-cache.json
          git commit -m "chore(triage): verdict cache update $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push -f origin "$BRANCH"
          if [ "$(gh pr list --head "$BRANCH" --state open --json number --jq length)" != "0" ]; then
            gh pr edit "$BRANCH" --body-file triage-report.md
          elif ! gh pr create --head "$BRANCH" --title "SAST triage: verdict cache update" --body-file triage-report.md; then
            echo "::error::Enable Settings → Actions → General → 'Allow GitHub Actions to create and approve pull requests'."
            exit 1
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: triage-${{ github.run_id }}
          path: |
            findings.sarif
            triaged.sarif
            triage-report.md
          retention-days: 7
