name: Triage

# Runs sast-triage against demo/vulnerable-app (a small, fixed, deliberately
# vulnerable app) and publishes the triage report to the run summary + an
# artifact. Nothing is committed. To triage a real repository instead, scan your
# own code and point -repo at the checkout — see the README.

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - name: Build sast-triage
        run: go build -o /usr/local/bin/sast-triage ./cmd/sast-triage

      # semgrep from its official image, pinned by digest (= v1.86.0). Avoids the
      # pipx/pkg_resources breakage on Python 3.12 runners.
      - name: Scan the demo app
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            semgrep/semgrep@sha256:a9ea2d5621c29d815d90c2a3b2f9571da8972ef4ff855c9e4902681730240e35 \
            semgrep scan --config auto --sarif --dataflow-traces --output demo-findings.sarif demo/vulnerable-app

      # Throwaway cache (RUNNER_TEMP): nothing is committed, so each run
      # re-triages the fixed app fresh. -repo . matches semgrep's cwd-relative paths.
      - name: Triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          sast-triage \
            -sarif demo-findings.sarif \
            -repo . \
            -cache "$RUNNER_TEMP/triage-cache.json" \
            -report demo-report.md

      - name: Publish report to run summary
        if: always()
        run: |
          if [ -f demo-report.md ]; then
            cat demo-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: triage-${{ github.run_id }}
          path: |
            demo-findings.sarif
            demo-report.md
          retention-days: 7
