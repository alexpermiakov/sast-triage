name: Triage

# Triages this repo's own opengrep findings.
#
# PR runs (read-only): scan + triage against the verdict cache committed on
# main, publish the report to the job summary, and fail ONLY if the PR
# introduces a new exploitable finding (exit 3) — pre-existing backlog never
# blocks a PR. Fork PRs can't see the API key; they skip triage with a notice
# instead of failing red.
#
# Push-to-main / manual runs (full): also file an issue per exploitable
# finding, and when the verdict cache changed, refresh ONE review PR carrying
# the cache delta with the report as its body. PRs approve suppressions;
# issues own vulnerabilities.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: triage-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pr-triage:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read # deliberately no write perms on PR-triggered runs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - name: Build sast-triage
        run: go build -o /usr/local/bin/sast-triage ./cmd/sast-triage

      - name: Install opengrep
        run: |
          curl -fsSL -o /usr/local/bin/opengrep \
            https://github.com/opengrep/opengrep/releases/download/v1.25.0/opengrep_manylinux_x86
          echo "9ac4aebb47ba3f7b0d8fc641ac8749cb6c2f253f616131a67d9631e00d4bea33  /usr/local/bin/opengrep" | sha256sum -c
          chmod +x /usr/local/bin/opengrep

      - name: Checkout scan rules (pinned)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: opengrep/opengrep-rules
          ref: f1d2b562b414783763fd02a6ed2736eaed622efa
          path: .opengrep-rules

      - name: Scan
        run: |
          opengrep scan -f .opengrep-rules/go -f .opengrep-rules/yaml \
            --sarif --dataflow-traces --exclude testdata --exclude .opengrep-rules \
            --output findings.sarif
          rm -rf .opengrep-rules

      # secrets.* is not usable in `if:` directly; route through an env var.
      - name: Check API key availability
        id: key
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: echo "available=$HAS_KEY" >> "$GITHUB_OUTPUT"

      - name: Triage (gate on new exploitable)
        if: steps.key.outputs.available == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          sast-triage \
            -sarif findings.sarif \
            -repo . \
            -fail-on-new-exploitable \
            -link-base "https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}"

      - name: Skip notice (no API key)
        if: steps.key.outputs.available != 'true'
        run: echo "::notice::ANTHROPIC_API_KEY unavailable (fork PR?) — scan ran, triage skipped."

      - name: Publish report to run summary
        if: always()
        run: |
          if [ -f triage-report.md ]; then
            cat triage-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: triage-${{ github.run_id }}
          path: |
            findings.sarif
            triage-report.md
          retention-days: 7

  main-triage:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the triage/main cache branch
      issues: write # file issues for exploitable findings
      pull-requests: write # open/refresh the cache review PR
      security-events: write # upload triaged SARIF + dismiss benign alerts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - name: Build sast-triage
        run: go build -o /usr/local/bin/sast-triage ./cmd/sast-triage

      # Same pinned scanner setup as pr-triage; see the comment there.
      - name: Install opengrep
        run: |
          curl -fsSL -o /usr/local/bin/opengrep \
            https://github.com/opengrep/opengrep/releases/download/v1.25.0/opengrep_manylinux_x86
          echo "9ac4aebb47ba3f7b0d8fc641ac8749cb6c2f253f616131a67d9631e00d4bea33  /usr/local/bin/opengrep" | sha256sum -c
          chmod +x /usr/local/bin/opengrep

      - name: Checkout scan rules (pinned)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: opengrep/opengrep-rules
          ref: f1d2b562b414783763fd02a6ed2736eaed622efa
          path: .opengrep-rules

      - name: Scan
        run: |
          opengrep scan -f .opengrep-rules/go -f .opengrep-rules/yaml \
            --sarif --dataflow-traces --exclude testdata --exclude .opengrep-rules \
            --output findings.sarif
          rm -rf .opengrep-rules

      - name: Triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          sast-triage \
            -sarif findings.sarif \
            -repo . \
            -create-issues \
            -github-repo "${{ github.repository }}" \
            -triaged-sarif triaged.sarif \
            -link-base "https://github.com/${{ github.repository }}/blob/${{ github.sha }}"

      # Post-triage truth in the Security tab: upload the verdict-annotated
      # SARIF, then apply its suppressions as dismissals — Code Scanning
      # ignores the SARIF `suppressions` property on upload, so benign alerts
      # are dismissed via the API by GitHub's dismiss-alerts action.
      # Requires code scanning enabled (Settings → Code security and analysis).
      - name: Upload triaged SARIF to Code Scanning
        id: codescan
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: triaged.sarif
          category: sast-triage

      - name: Dismiss benign alerts
        uses: advanced-security/dismiss-alerts@a18f986bdb40edba0dd7a74382c15d4a3d50a1c8 # v2.0.3
        with:
          sarif-id: ${{ steps.codescan.outputs.sarif-id }}
          sarif-file: triaged.sarif
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish report to run summary
        if: always()
        run: |
          if [ -f triage-report.md ]; then
            cat triage-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Refresh cache review PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- triage-cache.json)" ]; then
            echo "cache unchanged; no PR"
            exit 0
          fi
          BRANCH="triage/main"
          git config user.name "sast-triage-bot"
          git config user.email "sast-triage-bot@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add triage-cache.json
          git commit -m "chore(triage): verdict cache update $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push -f origin "$BRANCH"
          if [ "$(gh pr list --head "$BRANCH" --state open --json number --jq length)" != "0" ]; then
            gh pr edit "$BRANCH" --body-file triage-report.md
          elif ! gh pr create --head "$BRANCH" --title "SAST triage: verdict cache update" --body-file triage-report.md; then
            echo "::error::Could not open the review PR. Enable Settings → Actions → General → Workflow permissions → 'Allow GitHub Actions to create and approve pull requests'."
            exit 1
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: triage-${{ github.run_id }}
          path: |
            findings.sarif
            triaged.sarif
            triage-report.md
          retention-days: 7

