name: Triage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      provider:
        description: LLM provider for this run
        type: choice
        options: [anthropic, openai]
        default: anthropic
      model:
        description: "Model (empty = provider default: claude-sonnet-5 / qwen2.5-coder:1.5b-instruct)"
        type: string
        required: false
      base_url:
        description: OpenAI-compatible endpoint (openai only); localhost:11434 starts a local Ollama
        type: string
        default: http://localhost:11434/v1

concurrency:
  group: triage-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write

env:
  # Provider for push/PR runs (workflow_dispatch picks per run): anthropic | openai
  TRIAGE_PROVIDER: anthropic
  # Per-provider default models; the workflow_dispatch `model` input overrides.
  ANTHROPIC_MODEL: claude-sonnet-5
  OPENAI_MODEL: qwen2.5-coder:1.5b-instruct
  # openai only. Pointing it at localhost:11434 starts a local Ollama in the job.
  OPENAI_BASE_URL: http://localhost:11434/v1

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve provider/model
        id: llm
        env:
          INPUT_PROVIDER: ${{ inputs.provider }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_BASE_URL: ${{ inputs.base_url }}
        run: |
          PROVIDER="${INPUT_PROVIDER:-$TRIAGE_PROVIDER}"
          if [ "$PROVIDER" = anthropic ]; then DEFAULT="$ANTHROPIC_MODEL"; else DEFAULT="$OPENAI_MODEL"; fi
          {
            echo "provider=$PROVIDER"
            echo "model=${INPUT_MODEL:-$DEFAULT}"
            echo "base_url=${INPUT_BASE_URL:-$OPENAI_BASE_URL}"
          } >> "$GITHUB_OUTPUT"
          echo "triaging with $PROVIDER / ${INPUT_MODEL:-$DEFAULT}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - name: Build sast-triage
        run: go build -o /usr/local/bin/sast-triage ./cmd/sast-triage

      - name: Install opengrep
        run: |
          curl -fsSL -o /usr/local/bin/opengrep \
            https://github.com/opengrep/opengrep/releases/download/v1.25.0/opengrep_manylinux_x86
          echo "9ac4aebb47ba3f7b0d8fc641ac8749cb6c2f253f616131a67d9631e00d4bea33  /usr/local/bin/opengrep" | sha256sum -c
          chmod +x /usr/local/bin/opengrep

      - name: Checkout scan rules (pinned)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: opengrep/opengrep-rules
          ref: f1d2b562b414783763fd02a6ed2736eaed622efa
          path: .opengrep-rules

      - name: Scan
        run: |
          opengrep scan -f .opengrep-rules/go -f .opengrep-rules/yaml \
            --sarif --dataflow-traces --exclude testdata --exclude .opengrep-rules \
            --output findings.sarif
          rm -rf .opengrep-rules

      - name: Start local Ollama and pull model
        if: steps.llm.outputs.provider == 'openai' && contains(steps.llm.outputs.base_url, 'localhost:11434')
        env:
          MODEL: ${{ steps.llm.outputs.model }}
        run: |
          docker run -d -p 11434:11434 \
            ollama/ollama@sha256:50ab2378567a62b811a2967759dd91f254864c3495cbe50576bd8a85bc6edd56 # 0.6.8
          for i in $(seq 1 30); do curl -fsS http://localhost:11434/api/version && break || sleep 2; done
          curl -fsS http://localhost:11434/api/pull -d "{\"name\":\"$MODEL\"}"

      # PR gates on new exploitables; push files issues + writes the annotated SARIF.
      - name: Triage
        env:
          PROVIDER: ${{ steps.llm.outputs.provider }}
          MODEL: ${{ steps.llm.outputs.model }}
          BASE_URL: ${{ steps.llm.outputs.base_url }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          LINK_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$PROVIDER" = anthropic ]; then
            [ -z "$ANTHROPIC_API_KEY" ] && { echo "::notice::no API key (fork PR?) — triage skipped."; exit 0; }
            PROVIDER_ARGS="-provider anthropic -model $MODEL"
          else
            PROVIDER_ARGS="-provider openai -base-url $BASE_URL -model $MODEL"
          fi
          if [ "${{ github.event_name }}" = pull_request ]; then
            MODE="-fail-on-new-exploitable"
          else
            MODE="-create-issues -github-repo $REPO -triaged-sarif triaged.sarif"
          fi
          sast-triage $PROVIDER_ARGS \
            -sarif findings.sarif -repo . $MODE \
            -link-base "https://github.com/$REPO/blob/$LINK_SHA"

      - name: Upload triaged SARIF to Code Scanning
        id: codescan
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: triaged.sarif
          category: sast-triage

      - name: Dismiss benign alerts
        if: github.event_name != 'pull_request'
        uses: advanced-security/dismiss-alerts@a18f986bdb40edba0dd7a74382c15d4a3d50a1c8 # v2.0.3
        with:
          sarif-id: ${{ steps.codescan.outputs.sarif-id }}
          sarif-file: triaged.sarif
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish report to run summary
        if: always()
        run: '[ -f triage-report.md ] && cat triage-report.md >> "$GITHUB_STEP_SUMMARY" || true'

      - name: Refresh cache review PR
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- triage-cache.json)" ]; then
            echo "cache unchanged; no PR"; exit 0
          fi
          BRANCH="triage/main"
          git config user.name "sast-triage-bot"
          git config user.email "sast-triage-bot@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add triage-cache.json
          git commit -m "chore(triage): verdict cache update $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push -f origin "$BRANCH"
          if [ "$(gh pr list --head "$BRANCH" --state open --json number --jq length)" != "0" ]; then
            gh pr edit "$BRANCH" --body-file triage-report.md
          elif ! gh pr create --head "$BRANCH" --title "SAST triage: verdict cache update" --body-file triage-report.md; then
            echo "::error::Enable Settings → Actions → General → 'Allow GitHub Actions to create and approve pull requests'."
            exit 1
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: triage-${{ github.run_id }}
          path: |
            findings.sarif
            triaged.sarif
            triage-report.md
          retention-days: 7
