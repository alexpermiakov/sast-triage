name: Triage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      model:
        description: "Model to triage with, e.g. DeepSeek-V4-Pro or claude-sonnet-5"
        type: string
        required: true
        default: DeepSeek-V4-Pro
      base_url:
        description: "OpenAI-compatible endpoint — clear it to use Claude's native API instead"
        type: string
        required: false
        default: https://api.deepseek.com/v1

concurrency:
  group: triage-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write

env:
  # Model + endpoint for push/PR runs; the workflow_dispatch inputs override both.
  # DeepSeek triages this repo for roughly a thirtieth of Claude's cost; clearing
  # TRIAGE_BASE_URL switches back to Claude's native API.
  TRIAGE_MODEL: DeepSeek-V4-Pro
  TRIAGE_BASE_URL: https://api.deepseek.com/v1

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve model
        id: llm
        env:
          IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_BASE_URL: ${{ inputs.base_url }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          MODEL="${INPUT_MODEL:-$TRIAGE_MODEL}"
          if [ -z "$MODEL" ]; then
            echo "::error::model is required — there is no default, and triaging with the wrong model silently produces wrong verdicts"
            exit 1
          fi
          # On dispatch, take base_url verbatim: an operator who cleared the field
          # is asking for Claude, so it must not fall back to the env default.
          if [ "$IS_DISPATCH" = true ]; then BASE_URL="$INPUT_BASE_URL"; else BASE_URL="$TRIAGE_BASE_URL"; fi
          # base-url alone selects the OpenAI-compatible path; empty means Claude's
          # native API. Same inference the binary does, so neither is a default.
          if [ -n "$BASE_URL" ]; then PROVIDER=openai; else PROVIDER=anthropic; fi
          if [ "$PROVIDER" = anthropic ]; then KEY="$ANTHROPIC_API_KEY"; else KEY="$OPENAI_API_KEY"; fi
          SKIP=false
          if [ -z "$KEY" ]; then
            SKIP=true
            echo "::notice::no $PROVIDER API key (fork PR?) — triage skipped."
          fi
          {
            echo "provider=$PROVIDER"
            echo "model=$MODEL"
            echo "base_url=$BASE_URL"
            echo "skip=$SKIP"
          } >> "$GITHUB_OUTPUT"
          echo "triaging with $MODEL via $PROVIDER"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # testdata stays excluded: those fixtures' line numbers are pinned to unit
      # tests, and the agent short-circuits them to benign anyway.
      - name: Scan
        run: |
          pipx install semgrep
          semgrep scan --config=auto --dataflow-traces \
            --exclude testdata --sarif-output=findings.sarif

      # Dogfood: `uses: ./` resolves action.yml from this checkout, so PRs run
      # their own action code. PR gates on new exploitables (the default); push
      # opts out of the gate, files issues + writes the annotated SARIF.
      - name: Triage
        if: steps.llm.outputs.skip != 'true'
        uses: ./
        with:
          provider: ${{ steps.llm.outputs.provider }}
          model: ${{ steps.llm.outputs.model }}
          base-url: ${{ steps.llm.outputs.base_url }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai-api-key: ${{ secrets.DEEPSEEK_API_KEY }}
          fail-on-new-exploitable: ${{ github.event_name == 'pull_request' }}
          create-issues: ${{ github.event_name != 'pull_request' }}
          triaged-sarif: ${{ github.event_name != 'pull_request' && 'triaged.sarif' || '' }}
          link-base: https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha || github.sha }}

      - name: Upload triaged SARIF to Code Scanning
        id: codescan
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: triaged.sarif
          category: sast-triage

      - name: Dismiss benign alerts
        if: github.event_name != 'pull_request'
        uses: advanced-security/dismiss-alerts@a18f986bdb40edba0dd7a74382c15d4a3d50a1c8 # v2.0.3
        with:
          sarif-id: ${{ steps.codescan.outputs.sarif-id }}
          sarif-file: triaged.sarif
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish report to run summary
        if: always()
        run: '[ -f triage-report.md ] && cat triage-report.md >> "$GITHUB_STEP_SUMMARY" || true'

      - name: Refresh cache review PR
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- triage-cache.json)" ]; then
            echo "cache unchanged; no PR"; exit 0
          fi
          BRANCH="triage/main"
          git config user.name "sast-triage-bot"
          git config user.email "sast-triage-bot@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add triage-cache.json
          git commit -m "chore(triage): verdict cache update $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push -f origin "$BRANCH"
          if [ "$(gh pr list --head "$BRANCH" --state open --json number --jq length)" != "0" ]; then
            gh pr edit "$BRANCH" --body-file triage-report.md
          elif ! gh pr create --head "$BRANCH" --title "SAST triage: verdict cache update" --body-file triage-report.md; then
            echo "::error::Enable Settings → Actions → General → 'Allow GitHub Actions to create and approve pull requests'."
            exit 1
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: triage-${{ github.run_id }}
          path: |
            findings.sarif
            triaged.sarif
            triage-report.md
          retention-days: 7

