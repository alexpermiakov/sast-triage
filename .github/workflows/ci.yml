name: CI

on:
  push:
    branches: [main]
    # Cache commits carry [skip ci] too, but paths-ignore is the belt: a
    # suppression-set change cannot break a Go build, so it must not spend a
    # runner re-proving that.
    paths-ignore: [".sast-triage/**"]
  pull_request:
    paths-ignore: [".sast-triage/**"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
      - run: gofmt -l . && test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

