# Seeding: a deliberate one-off a maintainer runs by hand. It triages the whole
# backlog and opens ONE pull request titled "seed sast-triage cache".
#
# That PR is the point of this workflow. It is where a human reviews the entire
# proposed suppression set at once, with cited evidence per verdict, and either
# accepts it or edits it. Everything after is incremental: feature PRs add a
# handful of cache lines and nobody has to think about them again.
#
# Re-run it after anything that shifts fingerprints wholesale — a scanner
# upgrade, a ruleset change, a large refactor.
name: Triage (seed)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model to triage with — picks its endpoint and API key automatically"
        type: choice
        required: true
        default: deepseek-v4-pro
        options:
          - deepseek-v4-flash
          - deepseek-v4-pro
          - kimi-k2.7-code
          - kimi-k3
          - claude-sonnet-5
          - claude-opus-4-8

concurrency:
  group: triage-seed
  cancel-in-progress: false

permissions:
  contents: write # push the seed branch
  pull-requests: write # open the seed PR

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve endpoint and key
        id: llm
        # The model name is the only knob a maintainer turns; its API shape,
        # endpoint and secret follow from it here. Three fields that have to
        # agree is three chances to dispatch a run that points a DeepSeek key
        # at Anthropic's API and burns a full-backlog triage on a 401.
        #
        # The input reaches the shell as an env var and never as `${{ }}`
        # inside the script. GitHub expands `${{ }}` BEFORE bash sees the line,
        # so a model name of `x"; rm -rf $HOME; #` would be executed rather
        # than printed. Same rule action.yml states for its own inputs.
        env:
          INPUT_MODEL: ${{ inputs.model }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          # An empty base_url selects Claude's native API — the same inference
          # the binary does — so neither path is a default nobody chose.
          case "$INPUT_MODEL" in
            deepseek-*) provider=openai;    base_url=https://api.deepseek.com/v1; secret=DEEPSEEK_API_KEY ;;
            kimi-*)     provider=openai;    base_url=https://api.moonshot.ai/v1;  secret=MOONSHOT_API_KEY ;;
            claude-*)   provider=anthropic; base_url=;                            secret=ANTHROPIC_API_KEY ;;
            *) echo "::error::unknown model '$INPUT_MODEL' — add its endpoint and secret to this case first"; exit 1 ;;
          esac
          # Fail here, not forty findings into the run: a missing secret is a
          # repo-settings fix, and naming it saves the round trip.
          if [ -z "${!secret}" ]; then
            echo "::error::$INPUT_MODEL needs the $secret secret, which is not set on this repository"
            exit 1
          fi
          {
            echo "provider=$provider"
            echo "base_url=$base_url"
            echo "secret=$secret"
          } >> "$GITHUB_OUTPUT"
          echo "seeding with $INPUT_MODEL via $provider${base_url:+ at $base_url}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan
        run: |
          pipx install semgrep
          semgrep scan --exclude testdata --sarif-output=findings.sarif

      # mode: baseline — triage everything, gate nothing. A seeding run that
      # fails on the backlog it was invoked to catalogue is useless.
      - name: Triage
        uses: ./
        with:
          provider: ${{ steps.llm.outputs.provider }}
          model: ${{ inputs.model }}
          base-url: ${{ steps.llm.outputs.base_url }}
          # Indexed, not named: the secret follows the chosen model, and the
          # resolve step has already failed the run if it is unset.
          api-key: ${{ secrets[steps.llm.outputs.secret] }}
          scope: full
          mode: baseline
          cache-write: pr
          link-base: https://github.com/${{ github.repository }}/blob/${{ github.sha }}

      - name: Publish digest to run summary
        if: always()
        run: '[ -f triage-digest.md ] && cat triage-digest.md >> "$GITHUB_STEP_SUMMARY" || true'

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: triage-seed-${{ github.run_id }}
          path: |
            findings.sarif
            triaged.sarif
            triage-report.md
            triage-digest.md
            triage-summary.md
          retention-days: 7

